<style>
  /* ── shadcn-meets-enterprise tokens ─────────────────────────────────
     zinc-leaning neutrals, single blue accent. Both themes resolve via
     [data-theme] on <html> so the Tweaks dark toggle swaps everything at
     once with no per-component branching. */
  :root {
    --mono: "Geist Mono", ui-monospace, "JetBrains Mono", Menlo, monospace;
    --accent: #2563eb;
    --accent-fg: #fff;

    /* light (default) */
    --bg: #fafafa;
    --surface: #ffffff;
    --surface-2: #f4f4f5;
    --border: #e4e4e7;
    --border-subtle: #ececef;
    --text: #09090b;
    --text-muted: #71717a;

    --warning-bg: #fef3c7;
    --warning-border: #fde68a;
    --warning-fg: #92400e;
    --danger-fg: #b91c1c;

    /* badge tones */
    --badge-primary-fg: #1e40af;
    --badge-primary-bg: #dbeafe;
    --badge-primary-dot: #2563eb;
    --badge-secondary-fg: #52525b;
    --badge-secondary-bg: #f4f4f5;
    --badge-secondary-dot: #a1a1aa;
    --badge-used-fg: #166534;
    --badge-used-bg: #dcfce7;
    --badge-used-dot: #16a34a;
    --badge-notused-fg: #9a3412;
    --badge-notused-bg: #ffedd5;
    --badge-notused-dot: #ea580c;
    --badge-pending-fg: #854d0e;
    --badge-pending-bg: #fef9c3;
    --badge-pending-dot: #ca8a04;

    /* tri-toggle active states */
    --toggle-used-bg: #dcfce7;
    --toggle-used-fg: #166534;
    --toggle-notused-bg: #ffedd5;
    --toggle-notused-fg: #9a3412;
  }

  :root[data-theme="dark"] {
    --bg: #09090b;
    --surface: #18181b;
    --surface-2: #27272a;
    --border: #2e2e33;
    --border-subtle: #232327;
    --text: #fafafa;
    --text-muted: #a1a1aa;

    --warning-bg: #422006;
    --warning-border: #713f12;
    --warning-fg: #fcd34d;
    --danger-fg: #f87171;

    --badge-primary-fg: #93c5fd;
    --badge-primary-bg: rgba(37,99,235,.18);
    --badge-primary-dot: #60a5fa;
    --badge-secondary-fg: #a1a1aa;
    --badge-secondary-bg: rgba(255,255,255,.06);
    --badge-secondary-dot: #71717a;
    --badge-used-fg: #86efac;
    --badge-used-bg: rgba(22,163,74,.18);
    --badge-used-dot: #4ade80;
    --badge-notused-fg: #fdba74;
    --badge-notused-bg: rgba(234,88,12,.18);
    --badge-notused-dot: #fb923c;
    --badge-pending-fg: #fcd34d;
    --badge-pending-bg: rgba(202,138,4,.18);
    --badge-pending-dot: #facc15;

    --toggle-used-bg: rgba(22,163,74,.22);
    --toggle-used-fg: #86efac;
    --toggle-notused-bg: rgba(234,88,12,.22);
    --toggle-notused-fg: #fdba74;
  }

  html, body, #root { height: 100%; margin: 0; }
  body {
    font-family: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    color: var(--text);
    background: #f0eee9; /* design canvas bg shows through */
  }
  * { box-sizing: border-box; }
  ::selection { background: color-mix(in oklab, var(--accent), transparent 70%); }

  /* Hide scrollbars inside artboards so each card looks clean at any zoom */
  .dc-card *::-webkit-scrollbar { width: 0; height: 0; }

  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
